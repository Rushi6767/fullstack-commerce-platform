<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
        }

        .card-box{
            width:420px;
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 15px 40px rgba(0,0,0,0.25);
        }

        .title{
            text-align:center;
            font-weight:bold;
            margin-bottom:20px;
        }

        .subtitle{
            text-align:center;
            font-size:14px;
            color:gray;
            margin-bottom:25px;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .btn-register{
            width:100%;
            padding:12px;
            border-radius:10px;
            background:#4F46E5;
            color:white;
            border:none;
            font-size:16px;
            transition:0.3s;
        }

        .btn-register:hover{
            background:#3730A3;
            transform:translateY(-2px);
        }

        .login-link{
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }

        .login-link a{
            text-decoration:none;
            color:#4F46E5;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="card-box">

    <h2 class="title">Create Account 🚀</h2>

    <p class="subtitle">Join us and manage your contacts easily</p>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Username</label>
            {{ form.username }}
        </div>

        <div class="mb-3">
            <label>Email</label>
            {{ form.email }}
        </div>

        <div class="mb-3">
            <label>Password</label>
            {{ form.password1 }}
        </div>

        <div class="mb-3">
            <label>Confirm Password</label>
            {{ form.password2 }}
        </div>

        <button type="submit" class="btn-register">
            Register
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="/login/">Login</a>
    </div>

</div>

</body>
</html>
