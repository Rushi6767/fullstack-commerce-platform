<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Django Home</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            height: 100vh;
        }

        .hero {
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .card-custom {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
        }

        .btn-custom {
            margin-top: 20px;
            padding: 10px 25px;
            border-radius: 30px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand fw-bold">🔥 My Django App</span>
</nav>

<!-- HERO SECTION -->
<div class="hero">
    <div class="card-custom shadow-lg">

        <h1 class="fw-bold">Welcome to Django 🚀</h1>
        <p class="mt-3 text-light">
            Build fast, scalable and modern web applications with Python & Django.
        </p>

        <div class="mt-4">
            <a href="#" class="btn btn-primary btn-custom">Get Started</a>
            <a href="#" class="btn btn-outline-light btn-custom">Learn More</a>
        </div>

    </div>
</div>

</body>
</html>
