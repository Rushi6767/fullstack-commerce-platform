<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#4F46E5,#7C3AED,#EC4899);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial,Helvetica,sans-serif;
        }

        .contact-card{
            width:900px;
            background:rgba(255,255,255,.12);
            backdrop-filter:blur(15px);
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,.3);
        }

        .left-side{
            background:#111827;
            color:white;
            padding:50px;
            height:100%;
        }

        .left-side h2{
            font-weight:bold;
            margin-bottom:20px;
        }

        .left-side p{
            color:#d1d5db;
        }

        .contact-info{
            margin-top:35px;
        }

        .contact-info p{
            margin-bottom:20px;
            font-size:17px;
        }

        .contact-info i{
            color:#60A5FA;
            margin-right:10px;
            font-size:20px;
        }

        .right-side{
            background:white;
            padding:45px;
        }

        .right-side h2{
            font-weight:bold;
            color:#333;
            margin-bottom:30px;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        textarea{
            resize:none;
        }

        .btn-send{
            background:#4F46E5;
            color:white;
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            font-size:18px;
            transition:.3s;
        }
        .custom-input{
            height:55px;
            border-radius:12px;
            border:2px solid #e5e7eb;
            padding:15px;
            font-size:16px;
            transition:.3s;
            box-shadow:none;
        }

        .custom-input:focus{
            border-color:#4F46E5;
            box-shadow:0 0 0 .25rem rgba(79,70,229,.15);
        }

        textarea.custom-input{
            height:auto;
        }

        .btn-send:hover{
            background:#3730A3;
            transform:translateY(-2px);
        }

        @media(max-width:768px){

            .contact-card{
                width:95%;
            }

            .left-side{
                display:none;
            }

        }

    </style>

</head>

<body>

<div class="contact-card">

    <div class="row g-0">

        <!-- Left Side -->

        <div class="col-md-5">

            <div class="left-side">

                <h2>Contact Information</h2>

                <p>
                    We'd love to hear from you.
                    Send us your questions or feedback using the form.
                </p>

                <div class="contact-info">

                    <p>
                        <i class="bi bi-geo-alt-fill"></i>
                        Harrisburg, Pennsylvania
                    </p>

                    <p>
                        <i class="bi bi-envelope-fill"></i>
                        info@example.com
                    </p>

                    <p>
                        <i class="bi bi-telephone-fill"></i>
                        +1 (123) 456-7890
                    </p>

                </div>

            </div>

        </div>

        <!-- Right Side -->

        <div class="col-md-7">

            <div class="right-side">

                <h2>Send Message</h2>

                <form method="POST">

                    {% csrf_token %}

                    <<div class="mb-3">
    <label class="form-label fw-semibold">Full Name</label>
    <input
        type="text"
        name="name"
        class="form-control custom-input"
        placeholder="Enter your full name"
        required>
</div>

<div class="mb-3">
    <label class="form-label fw-semibold">Phone Number</label>
    <input
        type="text"
        name="phone"
        class="form-control custom-input"
        placeholder="Enter your phone number"
        required>
</div>

<div class="mb-3">
    <label class="form-label fw-semibold">Email Address</label>
    <input
        type="email"
        name="email"
        class="form-control custom-input"
        placeholder="Enter your email"
        required>
</div>

<div class="mb-3">
    <label class="form-label fw-semibold">Message</label>
    <textarea
        name="message"
        rows="5"
        class="form-control custom-input"
        placeholder="Write your message..."
        required></textarea>
</div>

                    <button class="btn-send">

                        <i class="bi bi-send-fill"></i>

                        Send Message

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
