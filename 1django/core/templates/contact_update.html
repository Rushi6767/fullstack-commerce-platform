<!DOCTYPE html>
<html>
<head>
    <title>Update Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card-box{
            width:500px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .title{
            font-weight:bold;
            margin-bottom:20px;
            text-align:center;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .btn-update{
            width:100%;
            padding:10px;
            border-radius:10px;
            background:#4F46E5;
            color:white;
            border:none;
        }

        .btn-update:hover{
            background:#3730A3;
        }

    </style>
</head>

<body>

<div class="card-box">

    <h3 class="title">✏️ Update Contact</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            {{ form.name }}
        </div>

        <div class="mb-3">
            <label>Phone</label>
            {{ form.phone }}
        </div>

        <div class="mb-3">
            <label>Email</label>
            {{ form.email }}
        </div>

        <div class="mb-3">
            <label>Message</label>
            {{ form.message }}
        </div>

        <button class="btn-update">
            Update
        </button>

        <a href="{% url 'contact_list' %}" class="btn btn-secondary mt-3 w-100">
            Back
        </a>

    </form>

</div>

</body>
</html>
