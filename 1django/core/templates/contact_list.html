<!DOCTYPE html>
<html>
<head>

<title>Contacts</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4 text-center">
All Contacts
</h2>

<table class="table table-bordered table-hover shadow">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Message</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for contact in contacts %}

<tr>

<td>{{ contact.id }}</td>

<td>{{ contact.name }}</td>

<td>{{ contact.phone }}</td>

<td>{{ contact.email }}</td>

<td>{{ contact.message|truncatechars:40 }}</td>

<td>

<a href="{% url 'contact_update' contact.id %}" class="btn btn-warning btn-sm">
Edit
</a>

{% if user.is_superuser %}
    <a href="{% url 'contact_delete' contact.id %}" class="btn btn-danger btn-sm">
        Delete
    </a>
{% endif %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
